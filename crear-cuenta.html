<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViajesApp - Crear Cuenta</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header-small">
                <div class="logo-container-small">
                    <svg class="plane-icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
                    </svg>
                    <div>
                        <h1 class="title-small">ViajesApp</h1>
                        <p class="subtitle-small">Tu viaje comienza aquí</p>
                    </div>
                </div>

                <a href="index.html" class="btn-back">
                    <svg class="arrow-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 12H5M12 19l-7-7 7-7"/>
                    </svg>
                    Volver
                </a>

                <h2>Crear cuenta</h2>
                <p class="description">
                    Si ya eres parte de ViajesApp, no necesitas crear una cuenta nueva.
                    <a href="index.html" class="link-blue">Inicia sesión</a> con tus datos de siempre.
                </p>
            </div>

            <form class="form">
                <div class="section">
                    <h3>Datos personales</h3>

                    <div class="form-group">
                        <label>País</label>
                        <select id="pais" class="select">
                            <option value="Perú">🇵🇪 Perú</option>
                            <option value="Chile">🇨🇱 Chile</option>
                            <option value="Argentina">🇦🇷 Argentina</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Tipo de documento</label>
                        <select id="tipoDocumento" class="select">
                            <option value="DNI">DNI</option>
                            <option value="Pasaporte">Pasaporte</option>
                            <option value="Carnet">Carnet de Extranjería</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Número de documento</label>
                        <input id="numeroDocumento" type="text" class="input" placeholder="Ingresa tu documento"/>
                    </div>

                    <div class="form-group">
                        <label>Nombre(s)</label>
                        <input id="nombres" type="text" class="input" placeholder="Ingresa tus nombres"/>
                    </div>

                    <div class="form-group">
                        <label>Apellidos</label>
                        <input id="apellidos" type="text" class="input" placeholder="Ingresa tus apellidos"/>
                    </div>
                </div>

                <div class="section border-top">
                    <h3>Datos de ingreso</h3>

                    <div class="form-group">
                        <label>Email</label>
                        <input id="email" type="email" class="input" placeholder="Ingresa tu email"/>
                    </div>

                    <div class="form-group">
                        <label>Contraseña</label>
                        <input id="password" type="password" class="input" placeholder="Contraseña"/>
                    </div>
                </div>

                <button type="button" class="btn-primary" onclick="crearUsuario()">
                    Crear cuenta
                </button>
            </form>
        </div>
    </div>

    <script>
        function crearUsuario() {
            const usuario = {
                pais: document.getElementById("pais").value,
                tipoDocumento: document.getElementById("tipoDocumento").value,
                numeroDocumento: document.getElementById("numeroDocumento").value,
                nombres: document.getElementById("nombres").value,
                apellidos: document.getElementById("apellidos").value,
                email: document.getElementById("email").value,
                password: document.getElementById("password").value
            };

            fetch("http://localhost:8080/usuarios", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(usuario)
            })
            .then(res => res.json())
            .then(data => {
                alert("Usuario creado con éxito");
                console.log(data);

                window.location.href = "index.html";
            })
            .catch(error => {
                console.error("Error:", error);
                alert("Error al crear usuario");
            });
        }
    </script>

</body>
</html>
