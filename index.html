<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViajesApp - Login</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="container">
        <div class="card">
            <div class="header">
                <div class="logo-container">
                    <svg class="plane-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
                    </svg>
                    <div>
                        <h1>ViajesApp</h1>
                        <p class="subtitle">Tu viaje comienza aquí</p>
                    </div>
                </div>
            </div>

            <div class="content">
                <h2>Ingresa tu usuario</h2>
                <form class="form" onsubmit="event.preventDefault(); login();">
                    
                    <input 
                        id="usuario"
                        type="text" 
                        class="input" 
                        placeholder="Email o Número de socio"
                        required
                    />

                    <input 
                        id="password"
                        type="password" 
                        class="input" 
                        placeholder="Contraseña"
                    />

                    <button type="submit" class="btn-primary">
                        Continuar
                    </button>

                    <div class="text-center">
                        <a href="crear-cuenta.html" class="link-primary">Crear cuenta</a>
                    </div>

                    <div class="text-center">
                        <span class="text-gray">¿No puedes ingresar a tu cuenta?</span>
                        <a href="recuperar-acceso.html" class="link-blue">Recupera el acceso</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function login() {
            const usuario = document.getElementById("usuario").value;
            const password = document.getElementById("password").value;

            console.log("Login intento:", usuario);

            // ============================
            // 🟢 MODO SIN BACKEND (ACTIVO)
            // ============================

            const usuarioGuardado = JSON.parse(localStorage.getItem("usuario"));

            if (!usuarioGuardado) {
                alert("No existe usuario registrado");
                return;
            }

            if (
                usuarioGuardado.email === usuario &&
                usuarioGuardado.password === password
            ) {
                alert("Login exitoso (modo local)");
                window.location.href = "home.html";
            } else {
                alert("Credenciales incorrectas");
            }


            // ============================
            // 🔵 MODO CON BACKEND (FUTURO)
            // ============================

    </script>

</body>
</html>
