<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViajesApp - Confirmar Reserva</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .checkout-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
            margin-top: 1.5rem;
        }
        .summary-card {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 1rem;
            padding: 1.5rem;
        }
        .summary-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.75rem;
            color: #475569;
        }
        .summary-total {
            display: flex;
            justify-content: space-between;
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 2px dashed #cbd5e1;
            font-size: 1.25rem;
            font-weight: 700;
            color: #0f172a;
        }
        @media (max-width: 768px) {
            .checkout-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
                    </svg>
                    <span>ViajesApp</span>
                </div>
            </div>
            <div class="nav-right">
                <div class="user-profile">
                    <div class="user-avatar" id="userAvatar">?</div>
                    <span id="userNombre">Usuario</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="search-container">
            <a href="resultados.html" class="btn-back" style="color: white; margin-bottom: 1rem;">
                ← Volver a resultados
            </a>

            <div class="card" style="max-width: 100%;">
                <h2>Completa tu reserva</h2>
                <p class="description">Estás a un paso de confirmar tu viaje.</p>

                <div class="checkout-grid">
                    <div>
                        <h3 class="border-top">Datos del titular</h3>
                        <form id="form-reserva" class="form" onsubmit="event.preventDefault(); confirmarReserva();">
                            <div class="details-grid-2" style="margin-bottom: 0;">
                                <div class="form-group">
                                    <label>Nombres</label>
                                    <input type="text" id="titular-nombres" class="input" required>
                                </div>
                                <div class="form-group">
                                    <label>Apellidos</label>
                                    <input type="text" id="titular-apellidos" class="input" required>
                                </div>
                            </div>

                            <h3 class="border-top" style="margin-top: 1rem;">Método de Pago</h3>
                            <div class="form-group">
                                <label>Número de Tarjeta</label>
                                <input type="text" class="input" placeholder="0000 0000 0000 0000" maxlength="19" required>
                            </div>
                            <div class="details-grid-2">
                                <div class="form-group">
                                    <label>Vencimiento</label>
                                    <input type="text" class="input" placeholder="MM/AA" maxlength="5" required>
                                </div>
                                <div class="form-group">
                                    <label>CVV</label>
                                    <input type="password" class="input" placeholder="123" maxlength="4" required>
                                </div>
                            </div>

                            <button type="submit" class="btn-primary" id="btn-pagar" style="margin-top: 1rem;">
                                Confirmar y Pagar
                            </button>
                        </form>
                    </div>

                    <div>
                        <div class="summary-card">
                            <h3 style="margin-bottom: 1.5rem;">Resumen de Compra</h3>
                            
                            <div style="margin-bottom: 1.5rem;">
                                <p style="font-weight: 600; color: #0d9488;" id="resumen-ruta">Cargando ruta...</p>
                                <p class="text-gray" style="font-size: 0.875rem;" id="resumen-vuelo">Cargando detalles...</p>
                            </div>

                            <div class="summary-item">
                                <span>Ticket x <span id="resumen-pasajeros">1</span></span>
                                <span id="resumen-precio-unitario">$0.00</span>
                            </div>
                            <div class="summary-item">
                                <span>Impuestos y tasas</span>
                                <span>$25.00</span>
                            </div>

                            <div class="summary-total">
                                <span>Total a pagar</span>
                                <span style="color: #0d9488;" id="resumen-total">$0.00</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="js/reserva.js"></script>
</body>
</html>
