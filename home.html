<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViajesApp - Buscar Vuelos</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .flight-card {
            background: white; border-radius: 1rem; padding: 1.5rem 2rem;
            margin-bottom: 1rem; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            display: flex; justify-content: space-between; align-items: center;
            border: 2px solid transparent; transition: all 0.2s;
        }
        .flight-card:hover { border-color: #0d9488; box-shadow: 0 10px 15px rgba(0, 0, 0, 0.1); }
        .flight-times { display: flex; align-items: center; gap: 2rem; }
        .time-block { text-align: center; }
        .time-block h3 { font-size: 1.5rem; margin-bottom: 0; color: #1f2937; }
        .flight-duration {
            text-align: center; color: #6b7280; font-size: 0.875rem; position: relative; padding: 0 1rem;
        }
        .flight-duration::before {
            content: ''; position: absolute; top: 50%; left: -10px; right: -10px; height: 2px; background: #d1d5db; z-index: 0;
        }
        .flight-duration span { background: white; padding: 0 0.5rem; position: relative; z-index: 1; }
        .no-results { text-align: center; padding: 4rem 2rem; background: white; border-radius: 1rem; }
    </style>
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <div class="nav-left">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
                </svg>
                <span>ViajesApp</span>
            </div>
            <div class="nav-menu">
                <a href="home.html" class="nav-link">Descubre</a>
                <a href="wishlist.html" class="nav-link">Mis viajes (Wishlist)</a>
                <a href="dashboard.html" class="nav-link">Panel de Datos</a>
            </div>
        </div>
        
        <div class="nav-right" style="display: flex; align-items: center; gap: 1.5rem;">
            <div class="user-profile">
                <div class="user-avatar" id="userAvatar">?</div>
                <span id="userNombre">Usuario</span>
            </div>

            <button onclick="cerrarSesion()" style="background: transparent; border: 1px solid white; color: white; border-radius: 0.5rem; padding: 0.4rem 0.8rem; cursor: pointer; font-size: 0.85rem; font-weight: 500;">
                Salir
            </button>
        </div>
        
    </div>
</nav>
    <main class="main-content">
        <div class="search-container">

            <div class="search-box" style="border-radius: 1rem; margin-bottom: 2rem;">
                <div class="trip-type-header">
                    <h2 class="search-title">Filtra tus vuelos</h2>
                </div>

                <div class="route-container" style="grid-template-columns: 1fr;">
                    <div class="destination-group">
                        <label class="input-label">Destino (Salidas desde Lima)</label>
                        <input type="text" id="input-destino" class="route-input" style="border-radius: 0.75rem;" placeholder="Ej. Cusco, Arequipa, Miami...">
                    </div>
                </div>

                <div class="details-grid">
                    <div class="input-group">
                        <label class="input-label">Cabina</label>
                        <select class="select-input" id="select-cabina">
                            <option value="Economy">Economy</option>
                            <option value="Premium">Premium Business</option>
                        </select>
                    </div>

                    <div class="dates-group">
                        <div class="input-group">
                            <label class="input-label">Fecha de salida</label>
                            <input type="date" id="input-fecha-ida" class="date-input">
                        </div>
                        <div class="input-group" id="returnDateGroup" style="display: none;">
                            <label class="input-label">Fecha de regreso</label>
                            <input type="date" id="input-fecha-vuelta" class="date-input">
                        </div>
                    </div>
                </div>

                <div class="search-actions">
                    <button id="btn-buscar-vuelos" class="btn-search">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="m21 21-4.35-4.35"/>
                        </svg>
                        Aplicar Filtros
                    </button>
                </div>
            </div>

            <h2 style="color: white; margin-bottom: 1.5rem;" id="titulo-resultados">Vuelos disponibles</h2>

            <div id="vuelos-container">
            </div>

        </div>
    </main>

    <script src="js/home.js"></script>
</body>
</html>
