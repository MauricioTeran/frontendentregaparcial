<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViajesApp - Buscar Vuelos</title>
    <style>
        /* Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #0d9488 0%, #14b8a6 50%, #5eead4 100%);
            min-height: 100vh;
        }

        /* Navbar */
        .navbar {
            background: linear-gradient(135deg, #0d9488 0%, #14b8a6 100%);
            color: white;
            padding: 1rem 2rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-left {
            display: flex;
            align-items: center;
            gap: 3rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: 700;
        }

        .logo-icon {
            width: 2rem;
            height: 2rem;
        }

        .nav-menu {
            display: flex;
            gap: 2rem;
        }

        .nav-link {
            color: white;
            text-decoration: none;
            font-size: 0.95rem;
        }

        .nav-link:hover {
            opacity: 0.8;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 2rem;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
        }

        .user-profile:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .user-avatar {
            width: 2rem;
            height: 2rem;
            background-color: white;
            color: #0d9488;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .chevron-down {
            width: 1.25rem;
            height: 1.25rem;
        }

        /* Main */
        .main-content {
            padding: 3rem 2rem;
        }

        .search-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Tabs */
        .tabs {
            display: flex;
            margin-bottom: 0;
        }

        .tab {
            background: white;
            border: none;
            padding: 1rem 2.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            border-radius: 0.75rem 0.75rem 0 0;
        }

        /* Search Box */
        .search-box {
            background: white;
            border-radius: 0 1rem 1rem 1rem;
            padding: 2.5rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }

        .trip-type-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }

        .search-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: #1f2937;
        }

        .trip-type-toggle {
            display: flex;
            gap: 0.5rem;
        }

        .trip-btn {
            background: white;
            border: 2px solid #e5e7eb;
            padding: 0.65rem 1.25rem;
            border-radius: 2rem;
            font-size: 0.95rem;
            cursor: pointer;
            color: #6b7280;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .trip-btn.active {
            background: #eff6ff;
            border-color: #3b82f6;
            color: #3b82f6;
        }

        .check-icon-small {
            width: 1rem;
            height: 1rem;
            display: none;
        }

        .trip-btn.active .check-icon-small {
            display: block;
        }

        /* Route Container */
        .route-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            margin-bottom: 1.5rem;
            position: relative;
        }

        .input-label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #374151;
        }

        .route-input {
            width: 100%;
            padding: 1rem 1.25rem;
            border: 2px solid #d1d5db;
            font-size: 1rem;
        }

        .origin-group .route-input {
            border-radius: 0.75rem 0 0 0.75rem;
        }

        .destination-group .route-input {
            border-radius: 0 0.75rem 0.75rem 0;
        }

        .route-input:focus {
            outline: none;
            border-color: #0d9488;
        }

        .swap-btn {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -10%);
            width: 2rem;
            height: 2rem;
            background: white;
            border: 2px solid #0d9488;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .swap-btn:hover {
            background: #0d9488;
        }

        .swap-btn svg {
            width: 1.25rem;
            height: 1.25rem;
            color: #0d9488;
        }

        .swap-btn:hover svg {
            color: white;
        }

        /* Details Grid */
        .details-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .dates-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .select-input,
        .date-input,
        .text-input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid #d1d5db;
            border-radius: 0.75rem;
            font-size: 1rem;
        }

        .select-input:focus,
        .date-input:focus,
        .text-input:focus {
            outline: none;
            border-color: #0d9488;
        }

        /* Passengers */
        .passengers-input {
            width: 100%;
            padding: 0.875rem 1rem;
            border: 2px solid #d1d5db;
            border-radius: 0.75rem;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
        }

        .passengers-input:hover {
            border-color: #0d9488;
        }

        .chevron-down-small {
            width: 1.25rem;
            height: 1.25rem;
        }

        .passengers-dropdown {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: white;
            border: 2px solid #d1d5db;
            border-radius: 0.75rem;
            margin-top: 0.5rem;
            padding: 1rem;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            z-index: 20;
        }

        .passenger-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            border-bottom: 1px solid #e5e7eb;
        }

        .passenger-row:last-child {
            border-bottom: none;
        }

        .passenger-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .passenger-icon {
            width: 2rem;
            height: 2rem;
        }

        .passenger-label {
            font-weight: 600;
        }

        .passenger-desc {
            font-size: 0.875rem;
            color: #6b7280;
        }

        .counter {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .counter-btn {
            width: 2.5rem;
            height: 2.5rem;
            background: white;
            border: 2px solid #d1d5db;
            border-radius: 0.5rem;
            font-size: 1.5rem;
            cursor: pointer;
            color: #dc2626;
            font-weight: 700;
        }

        .counter-btn:hover {
            border-color: #dc2626;
            background: #fef2f2;
        }

        .counter-value {
            font-size: 1.125rem;
            font-weight: 600;
            min-width: 2rem;
            text-align: center;
        }

        .details-grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .input-group {
            position: relative;
        }

        /* Checkbox */
        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .checkbox {
            width: 1.25rem;
            height: 1.25rem;
        }

        .checkbox-label {
            color: #374151;
        }

        /* Search Button */
        .search-actions {
            display: flex;
            justify-content: flex-end;
        }

        .btn-search {
            background: #dc2626;
            color: white;
            border: none;
            padding: 1rem 3rem;
            border-radius: 0.75rem;
            font-size: 1.125rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .btn-search:hover {
            background: #b91c1c;
        }

        .search-icon {
            width: 1.5rem;
            height: 1.5rem;
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .nav-menu {
                display: none;
            }
            .details-grid,
            .details-grid-2 {
                grid-template-columns: 1fr;
            }
            .dates-group {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <div class="logo">
                    <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
                    </svg>
                    <span>ViajesApp</span>
                </div>
                <div class="nav-menu">
                    <a href="#" class="nav-link">Descubre</a>
                    <a href="#" class="nav-link">Mis viajes</a>
                    <a href="#" class="nav-link">Centro de ayuda</a>
                </div>
            </div>
            <div class="nav-right">
                <a href="#" class="nav-link">Estado de vuelo</a>
                <div class="user-profile">
                    <div class="user-avatar" id="userAvatar">?</div>
                    <span id="userNombre">Usuario</span>
                    <svg class="chevron-down" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="m6 9 6 6 6-6"/>
                    </svg>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="search-container">
            <!-- Tabs -->
            <div class="tabs">
                <button class="tab">Vuelos</button>
            </div>

            <!-- Search Box -->
            <div class="search-box">
                <!-- Header -->
                <div class="trip-type-header">
                    <h2 class="search-title">¿A dónde quieres ir?</h2>
                    <div class="trip-type-toggle">
                        <button class="trip-btn active" id="roundTrip">
                            <svg class="check-icon-small" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <polyline points="20 6 9 17 4 12"/>
                            </svg>
                            Ida y vuelta
                        </button>
                        <button class="trip-btn" id="oneWay">Solo ida</button>
                    </div>
                </div>

                <!-- Origin & Destination -->
                <div class="route-container">
                    <div class="origin-group">
                        <label class="input-label">Desde</label>
                        <input type="text" class="route-input" placeholder="Ingresa un origen">
                    </div>
                    <button class="swap-btn">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M7 16V4M7 4L3 8M7 4l4 4m6 0v12m0 0l4-4m-4 4-4-4"/>
                        </svg>
                    </button>
                    <div class="destination-group">
                        <label class="input-label">Hacia</label>
                        <input type="text" class="route-input" placeholder="Ingresa un destino">
                    </div>
                </div>

                <!-- Cabin & Dates -->
                <div class="details-grid">
                    <div class="input-group">
                        <label class="input-label">Cabina</label>
                        <select class="select-input">
                            <option>Economy</option>
                            <option>Premium Economy</option>
                            <option>Premium Business</option>
                        </select>
                    </div>

                    <div class="dates-group">
                        <div class="input-group">
                            <label class="input-label">Ida</label>
                            <input type="date" class="date-input">
                        </div>
                        <div class="input-group" id="returnDateGroup">
                            <label class="input-label">Vuelta</label>
                            <input type="date" class="date-input">
                        </div>
                    </div>
                </div>

                <!-- Passengers & Promo -->
                <div class="details-grid-2">
                    <div class="input-group">
                        <label class="input-label">Pasajeros</label>
                        <div class="passengers-input" id="passengersDropdown">
                            <span id="passengersText">1 adulto</span>
                            <svg class="chevron-down-small" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="m6 9 6 6 6-6"/>
                            </svg>
                        </div>
                        
                        <div class="passengers-dropdown" id="passengersMenu">
                            <div class="passenger-row">
                                <div class="passenger-info">
                                    <svg class="passenger-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                                        <circle cx="12" cy="7" r="4"/>
                                    </svg>
                                    <div>
                                        <div class="passenger-label">Adultos</div>
                                        <div class="passenger-desc">12 o más años</div>
                                    </div>
                                </div>
                                <div class="counter">
                                    <button class="counter-btn" onclick="decreaseAdults()">−</button>
                                    <span class="counter-value" id="adultsCount">1</span>
                                    <button class="counter-btn" onclick="increaseAdults()">+</button>
                                </div>
                            </div>
                            
                            <div class="passenger-row">
                                <div class="passenger-info">
                                    <svg class="passenger-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
                                        <circle cx="9" cy="7" r="4"/>
                                    </svg>
                                    <div>
                                        <div class="passenger-label">Niños</div>
                                        <div class="passenger-desc">De 2 a 11 años</div>
                                    </div>
                                </div>
                                <div class="counter">
                                    <button class="counter-btn" onclick="decreaseChildren()">−</button>
                                    <span class="counter-value" id="childrenCount">0</span>
                                    <button class="counter-btn" onclick="increaseChildren()">+</button>
                                </div>
                            </div>

                            <div class="passenger-row">
                                <div class="passenger-info">
                                    <svg class="passenger-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <circle cx="12" cy="8" r="3"/>
                                        <path d="M12 14c-4 0-7 2-7 5v2h14v-2c0-3-3-5-7-5z"/>
                                    </svg>
                                    <div>
                                        <div class="passenger-label">Bebés</div>
                                        <div class="passenger-desc">Menores de 2 años</div>
                                    </div>
                                </div>
                                <div class="counter">
                                    <button class="counter-btn" onclick="decreaseInfants()">−</button>
                                    <span class="counter-value" id="infantsCount">0</span>
                                    <button class="counter-btn" onclick="increaseInfants()">+</button>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="input-group">
                        <label class="input-label">Código promocional</label>
                        <input type="text" class="text-input" placeholder="Código promocional">
                    </div>
                </div>

                <!-- Checkbox -->
                <div class="checkbox-container">
                    <input type="checkbox" class="checkbox">
                    <label class="checkbox-label">Usar millas + dinero</label>
                </div>

                <!-- Search Button -->
                <div class="search-actions">
                    <button class="btn-search">
                        <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="m21 21-4.35-4.35"/>
                        </svg>
                        Buscar vuelos
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Trip type toggle
        const roundTripBtn = document.getElementById('roundTrip');
        const oneWayBtn = document.getElementById('oneWay');
        const returnDateGroup = document.getElementById('returnDateGroup');

        roundTripBtn.addEventListener('click', function() {
            roundTripBtn.classList.add('active');
            oneWayBtn.classList.remove('active');
            returnDateGroup.style.display = 'block';
        });

        oneWayBtn.addEventListener('click', function() {
            oneWayBtn.classList.add('active');
            roundTripBtn.classList.remove('active');
            returnDateGroup.style.display = 'none';
        });

        // Passengers dropdown
        const passengersDropdown = document.getElementById('passengersDropdown');
        const passengersMenu = document.getElementById('passengersMenu');

        passengersDropdown.addEventListener('click', function() {
            passengersMenu.style.display = passengersMenu.style.display === 'block' ? 'none' : 'block';
        });

        document.addEventListener('click', function(event) {
            if (!event.target.closest('.input-group')) {
                passengersMenu.style.display = 'none';
            }
        });

        // Counters
        let adults = 1;
        let children = 0;
        let infants = 0;

        function updatePassengersText() {
            let text = '';
            if (adults > 0) text += adults + (adults === 1 ? ' adulto' : ' adultos');
            if (children > 0) text += (text ? ', ' : '') + children + (children === 1 ? ' niño' : ' niños');
            if (infants > 0) text += (text ? ', ' : '') + infants + (infants === 1 ? ' bebé' : ' bebés');
            document.getElementById('passengersText').textContent = text || '0 pasajeros';
        }

        function increaseAdults() {
            adults++;
            document.getElementById('adultsCount').textContent = adults;
            updatePassengersText();
        }

        function decreaseAdults() {
            if (adults > 1) {
                adults--;
                document.getElementById('adultsCount').textContent = adults;
                updatePassengersText();
            }
        }

        function increaseChildren() {
            children++;
            document.getElementById('childrenCount').textContent = children;
            updatePassengersText();
        }

        function decreaseChildren() {
            if (children > 0) {
                children--;
                document.getElementById('childrenCount').textContent = children;
                updatePassengersText();
            }
        }

        function increaseInfants() {
            infants++;
            document.getElementById('infantsCount').textContent = infants;
            updatePassengersText();
        }

        function decreaseInfants() {
            if (infants > 0) {
                infants--;
                document.getElementById('infantsCount').textContent = infants;
                updatePassengersText();
            }
        }
    </script>

    <script>
        const session = JSON.parse(localStorage.getItem("session"));

        if (session && session.usuario && session.usuario.nombres) {
            const nombre = session.usuario.nombres;

            document.getElementById("userNombre").textContent = nombre;
            document.getElementById("userAvatar").textContent =
                nombre.charAt(0).toUpperCase();

        } else {
            console.warn("Sesión inválida:", session);
            localStorage.removeItem("session");
            window.location.href = "index.html";
        }
    </script>


</body>
</html>
