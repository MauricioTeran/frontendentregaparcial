<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ViajesApp - Panel de Datos</title>
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .navbar { position: sticky; top: 0; z-index: 50; }
    </style>
</head>
<body class="bg-gray-100">

<nav class="navbar" style="background-color: #1f2937; padding: 1rem 2rem; color: white;">
    <div class="nav-container" style="display: flex; justify-content: space-between; align-items: center; max-width: 1200px; margin: 0 auto;">
        <div class="nav-left" style="display: flex; align-items: center; gap: 2rem;">
            <div class="logo" style="display: flex; align-items: center; gap: 0.5rem; font-size: 1.5rem; font-weight: bold;">
                <svg class="logo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 24px; height: 24px;">
                    <path d="M21 16v-2l-8-5V3.5a1.5 1.5 0 0 0-3 0V9l-8 5v2l8-2.5V19l-2 1.5V22l3.5-1 3.5 1v-1.5L13 19v-5.5l8 2.5z"/>
                </svg>
                <span>ViajesApp</span>
            </div>
            <div class="nav-menu" style="display: flex; gap: 1.5rem;">
                <a href="home.html" style="color: white; text-decoration: none;">Descubre</a>
                <a href="wishlist.html" style="color: white; text-decoration: none;">Mis viajes (Wishlist)</a>
                <a href="dashboard.html" style="color: white; text-decoration: none; ">Panel de Datos</a>
            </div>
        </div>
        
        <div class="nav-right" style="display: flex; align-items: center; gap: 1.5rem;">
            <div class="user-profile" style="display: flex; align-items: center; gap: 0.5rem;">
                <div class="user-avatar" id="userAvatar" style="background: #374151; padding: 0.5rem 1rem; border-radius: 50%;">?</div>
                <span id="userNombre">Usuario</span>
            </div>
            <button onclick="cerrarSesion()" style="background: transparent; border: 1px solid white; color: white; border-radius: 0.5rem; padding: 0.4rem 0.8rem; cursor: pointer;">
                Salir
            </button>
        </div>
    </div>
</nav>

<main class="max-w-7xl mx-auto py-8 px-4">
    <h1 class="text-3xl font-bold text-gray-800 mb-8">Reportes de Data Science (AWS Athena)</h1>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-lg font-semibold text-gray-700 mb-4">Ingresos Mensuales Totales</h2>
            <canvas id="ventasChart"></canvas>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-lg font-semibold text-gray-700 mb-4">Top 5 Destinos Más Rentables</h2>
            <canvas id="destinosChart"></canvas>
        </div>
    </div>

    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
        <h2 class="text-lg font-semibold text-gray-700 mb-4">Auditoría de Viajes por Usuario</h2>
        <div class="flex gap-4 mb-4">
            <input type="number" id="userIdInput" placeholder="ID del Usuario (ej. 1)" class="border border-gray-300 p-2 rounded-lg w-64 focus:outline-none focus:border-teal-500">
            <button onclick="buscarUsuario()" class="bg-teal-600 text-white px-6 py-2 rounded-lg hover:bg-teal-700 transition-colors">Consultar</button>
        </div>
        <div id="resultadoUsuario" class="overflow-auto max-h-64 mt-4">
            <p class="text-gray-500">Ingresa un ID para consultar el historial en el Data Lake.</p>
        </div>
    </div>
</main>

<script>
    const session = JSON.parse(localStorage.getItem("session"));
    if (session && session.usuario && session.usuario.nombres) {
        document.getElementById("userNombre").textContent = session.usuario.nombres;
        document.getElementById("userAvatar").textContent = session.usuario.nombres.charAt(0).toUpperCase();
    } else {
        window.location.href = "index.html";
    }

    window.cerrarSesion = function() {
        if (confirm("¿Estás seguro que deseas cerrar sesión?")) {
            localStorage.clear();
            window.location.href = "index.html";
        }
    };

    const API_BASE_URL = "https://7i866xq21k.execute-api.us-east-1.amazonaws.com";

    async function cargarVentas() {
        try {
            const response = await fetch(`${API_BASE_URL}/data/ventas-mensuales`);
            const data = await response.json();
            
            new Chart(document.getElementById('ventasChart'), {
                type: 'line',
                data: {
                    labels: data.map(item => item.mes),
                    datasets: [{
                        label: 'Ingresos ($)',
                        data: data.map(item => item.ingresos),
                        borderColor: '#0d9488',
                        backgroundColor: 'rgba(13, 148, 136, 0.1)',
                        tension: 0.4,
                        fill: true
                    }]
                }
            });
        } catch (error) {
            console.error("Error:", error);
        }
    }

    async function cargarTopDestinos() {
        try {
            const response = await fetch(`${API_BASE_URL}/data/top-destinos`);
            const data = await response.json();

            new Chart(document.getElementById('destinosChart'), {
                type: 'bar',
                data: {
                    labels: data.map(item => item.destino),
                    datasets: [{
                        label: 'Total Reservas',
                        data: data.map(item => item.total_reservas),
                        backgroundColor: '#3b82f6',
                        borderRadius: 4
                    }]
                }
            });
        } catch (error) {
            console.error("Error:", error);
        }
    }

    async function buscarUsuario() {
        const id = document.getElementById('userIdInput').value;
        const contenedor = document.getElementById('resultadoUsuario');
        if(!id) return;
        
        contenedor.innerHTML = "<p class='text-teal-600'>Ejecutando query en AWS Athena...</p>";

        try {
            // ¡AGREGAMOS /data AQUÍ!
            const response = await fetch(`${API_BASE_URL}/data/destinos-por-usuario/${id}`);
            const data = await response.json();

            if(data.length === 0) {
                contenedor.innerHTML = "<p class='text-red-500'>No hay registros para este usuario.</p>";
                return;
            }

            let html = `<table class="min-w-full text-left text-sm font-light mt-4">
                            <thead class="border-b font-medium bg-gray-50">
                                <tr><th class="px-6 py-3">Pasajero</th><th class="px-6 py-3">Destino</th><th class="px-6 py-3">Viajes Realizados</th></tr>
                            </thead>
                            <tbody>`;
            data.forEach(f => {
                html += `<tr class="border-b hover:bg-gray-50"><td class="px-6 py-4">${f.nombre}</td><td class="px-6 py-4">${f.destino}</td><td class="px-6 py-4 font-bold text-teal-600">${f.viajes}</td></tr>`;
            });
            html += `</tbody></table>`;
            contenedor.innerHTML = html;
        } catch (error) {
            contenedor.innerHTML = "<p class='text-red-500'>Error al conectar con la API de Athena.</p>";
        }
    }

    window.onload = () => {
        cargarVentas();
        cargarTopDestinos();
    };
</script>
</body>
</html>
